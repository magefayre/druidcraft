name: Setup
description: Setup Node and restore dependencies
runs:
  using: composite
  steps:
    - name: Node
      id: node
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: yarn
    - name: Install dependencies
      shell: bash
      run: yarn install
      env:
        HUSKY: 0
